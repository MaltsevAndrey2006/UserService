name: CI Pipeline

on:
  push:
    branches: [ dev, master, feature/* ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.organization=maltsevandrey2006 -Dsonar.projectKey=maltsevandrey2006_UserService

      - name: Package with Maven (build jar)
        run: mvn package -DskipTests

      - name: Build Docker image
        run: |
          docker build -t user-service:${{ github.sha }} .
          docker tag user-service:${{ github.sha }} user-service:latest

      - name: Save Docker image
        run: docker save user-service:latest -o user-service.tar

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: user-service.tar